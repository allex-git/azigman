name: pipeline

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "Dockerfile"
      - "requirements.txt"

permissions:
  contents: read

concurrency:
  group: pipeline-main
  cancel-in-progress: true

env:
  IMAGE_NAME: final-project

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: check python syntax
        run: python -m py_compile $(git ls-files '*.py')

      - name: dockerfile lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          failure-threshold: error

      - name: scan secrets
        uses: trufflesecurity/trufflehog@v3.90.5
        with:
          path: ./
          base: HEAD~1
          head: HEAD
          extra_args: --only-verified

  build:
    runs-on: ubuntu-latest
    needs: lint

    outputs:
      tag: ${{ steps.vars.outputs.TAG }}

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: generate commit sha
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: build image without push
        run: docker build -t test-image:${{ steps.vars.outputs.TAG }} .

  scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: build image for scan
        run: docker build -t test-image:${{ needs.build.outputs.tag }} .

  push:
    runs-on: ubuntu-latest
    needs:
      - build
      - scan

    outputs:
      tag: ${{ needs.build.outputs.tag }}

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.tag }}

  update:
    runs-on: ubuntu-latest
    needs: push

    permissions:
      contents: write

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: update and push deployment
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git pull --rebase origin main

          sed -i 's|image: .*/final-project:.*|image: '"${{ secrets.DOCKERHUB_USERNAME }}/final-project:${{ needs.push.outputs.tag }}"'|' kubernetes/deployment.yaml

          git add kubernetes/deployment.yaml

          if git diff --cached --quiet; then
            echo "No deployment image change"
            exit 0
          fi

          git commit -m "update image tag to ${{ needs.push.outputs.tag }}"
          git push
