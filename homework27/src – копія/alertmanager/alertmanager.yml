global:
  resolve_timeout: 1m

route:
  receiver: telegram
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1m

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: "8504172518:AAHKznvbbYENI5NqFpAAky2JqYNV2Gsz8zo"
        chat_id: 2050022182
        parse_mode: "HTML"
        message: |
          {{ if eq .Status "firing" }}
          <b>HW27 проблема</b>
          {{ else }}
          <b>HW27 відновлено</b>
          {{ end }}
          {{ range .Alerts }}
          <b>{{ .Annotations.summary }}</b>
          {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          {{ end }}
        send_resolved: true