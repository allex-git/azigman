groups:
  - name: system-alerts
    rules:

      - alert: HighCPUUsage
        expr: "100 - (avg by(instance)(rate(node_cpu_seconds_total{mode='idle'}[10s])) * 100) > 60"
        for: 15s
        labels:
          severity: warning
        annotations:
          summary: "високе навантаження CPU"
          description: "CPU > 70% for 15 seconds on {{ $labels.instance }}"

      - alert: LowDiskSpace
        expr: "(node_filesystem_avail_bytes{fstype!~'tmpfs|overlay'} / node_filesystem_size_bytes{fstype!~'tmpfs|overlay'}) * 100 < 15"
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "мало місця на диску"
          description: "Free space < 15% on {{ $labels.instance }} ({{ $labels.mountpoint }})"

      - alert: TargetDown
        expr: "up == 0"
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cadvisor недоступний"
          description: "Service {{ $labels.job }} on {{ $labels.instance }} is down"